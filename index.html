<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Ocean Eddy Simulator</title>
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="deep-ocean-eddy-simulator" />
    <link rel="manifest" href="favicon/site.webmanifest" />


    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #050505;
        color: #eee;
        font-family: 'Courier New', Courier, monospace; /* Monospace for that 'instrument' feel */
      }

      #ui-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: auto; /* Changed to auto so you can click the link */
        z-index: 100;
        max-width: 300px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #44ccff;
      }

      p {
        margin: 5px 0 15px 0;
        font-size: 0.85rem;
        line-height: 1.3;
        opacity: 0.9;
      }

      /* Beautiful Link Styling */
      .nav-link {
        display: inline-block;
        padding: 8px 12px;
        background: rgba(68, 204, 255, 0.1);
        border: 1px solid #44ccff;
        color: #44ccff;
        text-decoration: none;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }

      .nav-link:hover {
        background: #44ccff;
        color: #050505;
        box-shadow: 0 0 15px rgba(68, 204, 255, 0.5);
      }

      /* Mobile Adjustments */
      @media (max-width: 600px) {
        #ui-overlay {
          top: 10px;
          left: 10px;
          max-width: 180px; /* Slimmer to stay clear of the GUI on the right */
        }
        h1 {
          font-size: 1rem;
        }
        p {
          font-size: 0.7rem;
        }
        /* lil-gui usually sits at the top-right. 
           If it still overlaps, we move the overlay to the bottom */
        #ui-overlay {
            top: auto;
            bottom: 30px;
        }
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      /* Style for the lil-gui specifically to make it look 8-bit/Agency style */
      .lil-gui { 
        --background-color: rgba(5, 5, 5, 0.8);
        --header-color: #111;
        --title-color: #44ccff;
        --widget-color: #222;
        --focus-color: #44ccff;
        --number-color: #44ccff;
      }
    </style>
  </head>
  <body>
    
    <div id="ui-overlay">
      <h1>Ocean Eddy Dynamics</h1>
      <p>3D Visualization of Mesoscale Turbulence & Spectral Eddy Mergers</p>
      
      <a href="https://nlse-ocean-surface.vercel.app" class="nav-link">
        → Switch to Freakwaves
      </a>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
